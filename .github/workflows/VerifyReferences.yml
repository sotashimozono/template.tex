name: Verify references

# Checks that every DOI / arXiv reference in references.bib resolves
# to real metadata (Crossref / arXiv). Backed by sotashimozono/doiget.

on:
  pull_request:
    paths:
      - "references.bib"
      - ".github/workflows/VerifyReferences.yml"
  push:
    branches: [main]
    paths:
      - "references.bib"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify references resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v5
        with:
          path: ~/.cache/doiget
          key: doiget-resolver-${{ hashFiles('references.bib') }}
          restore-keys: doiget-resolver-

      - uses: sotashimozono/doiget/.github/actions/verify@next
        with:
          path: references.bib
          strict: "false"
          contact-email: souta.shimozono@gmail.com
