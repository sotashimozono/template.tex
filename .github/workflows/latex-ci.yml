name: LaTeX CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          latexmk_use_lualatex: true
          pre_compile: |
            mkdir -p out
            lualatex --version
            bibtex --version

      - uses: actions/upload-artifact@v7
        with:
          name: paper-pdf
          path: out/main.pdf
          retention-days: 14

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: paper-pdf
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/main.pdf
          generate_release_notes: true
