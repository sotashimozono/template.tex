name: LaTeX CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          latexmk_use_lualatex: true
          pre_compile: |
            mkdir -p out
            lualatex --version
            bibtex --version

      - uses: actions/upload-artifact@v7
        with:
          name: paper-pdf
          path: out/main.pdf
          retention-days: 14
