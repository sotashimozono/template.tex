name: Release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version without 'v' prefix (e.g. 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  setup:
    name: Resolve version and verify
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check tag matches VERSION
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          EXPECTED="v$(cat VERSION)"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "ERROR: tag '${TAG}' does not match VERSION ('${EXPECTED}')"
            exit 1
          fi

  build-paper:
    name: Build paper
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          latexmk_use_lualatex: true
          pre_compile: mkdir -p out

      - uses: actions/upload-artifact@v7
        with:
          name: paper
          path: out/main.pdf

      - name: Package arXiv bundle
        run: |
          mkdir arxiv-src
          cp main.tex arxiv-src/
          cp out/main.bbl arxiv-src/ 2>/dev/null || true
          find figures -name "*.pdf" -exec cp {} arxiv-src/ \; 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        with:
          name: arxiv-src
          path: arxiv-src/

  build-diff:
    name: Build latexdiff PDF
    needs: [setup]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find previous tag
        id: tags
        run: |
          PREV=$(git tag --sort=-v:refname | grep -v "^${{ needs.setup.outputs.tag }}$" | head -1)
          echo "prev=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Extract previous main.tex
        if: steps.tags.outputs.prev != ''
        run: git show "${{ steps.tags.outputs.prev }}":main.tex > prev_main.tex

      - name: Compile latexdiff
        if: steps.tags.outputs.prev != ''
        uses: xu-cheng/latex-action@v4
        with:
          root_file: diff.tex
          latexmk_use_lualatex: true
          pre_compile: |
            mkdir -p out
            latexdiff prev_main.tex main.tex > diff.tex

      - uses: actions/upload-artifact@v7
        if: steps.tags.outputs.prev != ''
        with:
          name: diff
          path: out/diff.pdf

  build-supplementary:
    name: Build supplementary
    needs: [setup]
    runs-on: ubuntu-latest
    if: hashFiles('supplemental.tex') != ''
    steps:
      - uses: actions/checkout@v6

      - uses: xu-cheng/latex-action@v4
        with:
          root_file: supplemental.tex
          latexmk_use_lualatex: true
          pre_compile: mkdir -p out

      - uses: actions/upload-artifact@v7
        with:
          name: supplementary
          path: out/supplemental.pdf

  release:
    name: GitHub Release
    needs: [setup, build-paper, build-diff, build-supplementary]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.build-paper.result == 'success' &&
      (needs.build-diff.result == 'success' || needs.build-diff.result == 'skipped') &&
      (needs.build-supplementary.result == 'success' || needs.build-supplementary.result == 'skipped')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dl/

      - name: Prepare release assets
        run: |
          V="${{ needs.setup.outputs.tag }}"
          mkdir release
          [ -f dl/paper/main.pdf ]                 && mv dl/paper/main.pdf                 "release/paper-${V}.pdf"
          [ -f dl/diff/diff.pdf ]                  && mv dl/diff/diff.pdf                  "release/diff-${V}.pdf"
          [ -f dl/supplementary/supplemental.pdf ] && mv dl/supplementary/supplemental.pdf "release/supplemental-${V}.pdf"
          [ -d dl/arxiv-src ]                      && (cd dl/arxiv-src && zip "../../release/arxiv-bundle-${V}.zip" ./*)

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          files: release/*
          generate_release_notes: true
